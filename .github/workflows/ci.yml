# Meridian CI — Continuous Integration
#
# This workflow runs on every push and pull request to the main branch.
# It ensures:
#   1. Dependencies install cleanly
#   2. The project builds without errors
#   3. All tests pass
#
# GitHub Actions runs this in a fresh Ubuntu VM each time.
# Learn more: https://docs.github.com/en/actions

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Test job ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v5

      # Step 2: Install the specified Node.js version
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Step 3: Install project dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Lint the codebase
      - name: Run linter
        run: npm run lint

      # Step 5: Run all tests with Vitest
      - name: Run tests
        run: npm test

  # ── Build job ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
